# Load .env from project root (same folder as gradlew). optional = no error if file missing.
spring.config.import=optional:file:.env[.properties]

spring.application.name=cell-architecture-api

# config database
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cell_architecture?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# config port
server.port=7070

# config jwt
# Base64 key >= 32 bytes decoded (HS256). Override via .env JWT_SECRET=
duccute.jwt.base64-secret=${JWT_SECRET:Y2VsbGFyY2hpdGVjdHVyZWp3dHNlY3JldGtleTEyMzQ=}
duccute.jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_VALIDITY:3600}
duccute.jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_VALIDITY:86400}

# config pagination
spring.data.web.pageable.one-indexed-parameters=true

# storage config
storage.location=${STORAGE_LOCATION:C:/DucNguyen/cell-architecture-storage}
storage.max-file-size=${STORAGE_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-file-size=${storage.max-file-size}
spring.servlet.multipart.max-request-size=${storage.max-file-size}

# backward-compatible fallback for legacy consumers
upload-file.base-uri=${UPLOAD_FILE_BASE_URI:file:///C:/DucNguyen/cell-architecture-storage/}
